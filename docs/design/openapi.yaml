openapi: 3.0.3
info:
  title: Parking Reservation API
  description: 駐車場予約システムAPI（MVP）
  version: 1.0.0

servers:
  - url: http://localhost:3000

tags:
  - name: Auth
  - name: Parking
  - name: Reservation
  - name: Admin

paths:

  /api/auth/login:
    post:
      tags: [Auth]
      summary: ログイン
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          description: 認証失敗

  /api/parking-slots/timeline:
    get:
      tags: [Parking]
      summary: タイムライン形式の予約状況取得
      parameters:
        - name: date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: タイムラインデータ
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TimelineSlot'

  /api/reservations:
    post:
      tags: [Reservation]
      summary: 予約作成
      description: |
        以下の場合は予約不可（409を返す）

        1. 同一駐車枠で時間重複がある
        2. ユーザーの同時間帯予約が2件以上になる
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReservationRequest'
      responses:
        "201":
          description: 予約作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reservation'
        "400":
          description: リクエスト不正
        "401":
          description: 認証エラー
        "403":
          description: 権限エラー
        "409":
          description: 予約競合

  /api/reservations/me:
    get:
      tags: [Reservation]
      summary: 自分の予約取得
      security:
        - bearerAuth: []
      responses:
        "200":
          description: 自分の予約一覧
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reservation'
        "401":
          description: 認証エラー

  /api/reservations/{reservationId}:
    delete:
      tags: [Reservation]
      summary: 予約キャンセル
      description: |
        予約開始時間を過ぎた予約はキャンセル不可（403）
      security:
        - bearerAuth: []
      parameters:
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功
        "400":
          description: リクエスト不正
        "401":
          description: 認証エラー
        "403":
          description: キャンセル不可
        "404":
          description: 存在しない

  /api/admin/users:
    post:
      tags: [Admin]
      summary: ユーザ作成
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        "201":
          description: 作成成功
        "400":
          description: リクエスト不正
        "403":
          description: 権限エラー

  /api/admin/users/{userId}:
    delete:
      tags: [Admin]
      summary: ユーザ削除
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: 削除成功
        "403":
          description: 権限エラー

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    LoginRequest:
      type: object
      properties:
        buildingNumber:
          type: integer
        roomNumber:
          type: integer
        password:
          type: string
      required:
        - buildingNumber
        - roomNumber
        - password

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        isFirstLogin:
          type: boolean
        user:
          $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: integer
        buildingNumber:
          type: integer
        roomNumber:
          type: integer
        name:
          type: string
        role:
          type: string

    CreateUserRequest:
      type: object
      properties:
        buildingNumber:
          type: integer
        roomNumber:
          type: integer
        name:
          type: string
        password:
          type: string
      required:
        - buildingNumber
        - roomNumber
        - name
        - password

    CreateReservationRequest:
      type: object
      properties:
        parkingSpaceId:
          type: integer
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        carNumber:
          type: string
          minLength: 1
          maxLength: 4
          pattern: '^[0-9]{1,4}$'
      required:
        - parkingSpaceId
        - startTime
        - endTime
        - carNumber

    Reservation:
      type: object
      properties:
        reservationId:
          type: integer
        parkingSpaceId:
          type: integer
        parkingSpaceNumber:
          type: string
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        carNumber:
          type: string
        createdAt:
          type: string
          format: date-time

    TimelineSlot:
      type: object
      properties:
        parkingSpaceId:
          type: integer
        parkingSpaceNumber:
          type: string
        reservations:
          type: array
          items:
            type: object
            properties:
              startTime:
                type: string
                format: date-time
              endTime:
                type: string
                format: date-time
              isMine:
                type: boolean